<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Program Manager Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #e2e8f0; }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    header { margin-bottom: 40px; }
    h1 { font-size: 2.5em; margin-bottom: 10px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
    .metric-card { background: #1e293b; border: 1px solid #334155; padding: 20px; border-radius: 8px; text-align: center; }
    .metric-card .number { font-size: 2em; color: #3b82f6; font-weight: bold; }
    .metric-card .label { color: #94a3b8; margin-top: 10px; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; }
    .panel { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 20px; }
    .panel h2 { color: #60a5fa; margin-bottom: 15px; font-size: 1.3em; }
    .team-item { background: #0f172a; padding: 15px; margin-bottom: 10px; border-radius: 6px; border-left: 4px solid #3b82f6; }
    .team-item.at-risk { border-left-color: #ef4444; }
    .team-item .header { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .team-item .name { font-weight: bold; }
    .team-item .progress { background: #334155; height: 6px; border-radius: 3px; overflow: hidden; }
    .team-item .progress-bar { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); transition: width 0.3s; }
    .status { padding: 4px 8px; border-radius: 4px; font-size: 0.85em; font-weight: bold; }
    .status.on-track { background: #10b981; color: #ecfdf5; }
    .status.at-risk { background: #ef4444; color: #fef2f2; }
    .anomaly { background: #7c2d12; border-left: 4px solid #ea580c; padding: 15px; margin-bottom: 10px; border-radius: 6px; }
    .anomaly.high { border-left-color: #dc2626; background: #7f1d1d; }
    .anomaly .severity { display: inline-block; padding: 4px 8px; background: rgba(255,255,255,0.1); border-radius: 4px; font-size: 0.85em; margin-top: 8px; }
    .checkin-item { background: #0f172a; padding: 12px; margin-bottom: 8px; border-radius: 6px; border-left: 3px solid #8b5cf6; }
    .checkin-item .confirmed { color: #10b981; }
    .checkin-item .pending { color: #f59e0b; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 0.95em; margin-top: 10px; }
    button:hover { background: #2563eb; }
    input, textarea { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 10px; border-radius: 6px; margin-bottom: 10px; width: 100%; }
    .log-entry { background: #0f172a; padding: 10px; margin-bottom: 8px; border-radius: 6px; border-left: 3px solid #06b6d4; font-size: 0.9em; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🚀 AI Program Manager Hub</h1>
      <p>Real-time team & project tracking with AI assistance</p>
    </header>

    <div class="metrics" id="metrics"></div>

    <div class="grid">
      <div class="panel">
        <h2>📊 Teams Overview</h2>
        <div id="teams"></div>
      </div>

      <div class="panel">
        <h2>⚠️  Anomalies & Alerts</h2>
        <div id="anomalies"></div>
      </div>

      <div class="panel">
        <h2>📅 Upcoming Check-ins</h2>
        <div id="checkins"></div>
      </div>

      <div class="panel">
        <h2>💬 Discord Joins</h2>
        <div id="discord"></div>
        <div style="margin-top: 15px;">
          <input type="text" id="newMemberName" placeholder="Name">
          <input type="text" id="newMemberSkills" placeholder="Skills">
          <input type="text" id="newMemberInterest" placeholder="Interest">
          <button onclick="matchNewMember()">Match to Team</button>
        </div>
      </div>
    </div>

    <div class="panel" style="margin-top: 30px;">
      <h2>🤖 AI Assistant</h2>
      <textarea id="aiPrompt" placeholder="Ask me anything about team status, scheduling, or decisions..." rows="4"></textarea>
      <button onclick="askAI()">Get AI Insight</button>
      <div id="aiResponse" style="margin-top: 15px; padding: 15px; background: #0f172a; border-radius: 6px; display: none;"></div>
    </div>

    <div class="panel" style="margin-top: 30px;">
      <h2>📝 Live Feed</h2>
      <div id="live" style="max-height: 300px; overflow-y: auto;"></div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3000';
    let state = {};

    async function fetchState() {
      try {
        const res = await fetch(`${API_BASE}/api/state`);
        state = await res.json();
        render();
      } catch (e) { console.error('Fetch error:', e); }
    }

    function render() {
      // Metrics
      document.getElementById('metrics').innerHTML = `
        <div class="metric-card">
          <div class="number">${state.metrics?.total || 100}</div>
          <div class="label">Total Devs</div>
        </div>
        <div class="metric-card">
          <div class="number">${state.metrics?.teams || 13}</div>
          <div class="label">Teams</div>
        </div>
        <div class="metric-card">
          <div class="number" style="color: #ef4444;">${state.metrics?.behind || 0}</div>
          <div class="label">At-Risk</div>
        </div>
        <div class="metric-card">
          <div class="number" style="color: #f59e0b;">${state.metrics?.missed || 0}</div>
          <div class="label">Missed Check-ins</div>
        </div>
      `;

      // Teams
      document.getElementById('teams').innerHTML = (state.teams || []).map(t => `
        <div class="team-item ${t.status}">
          <div class="header">
            <div class="name">Team ${t.id}</div>
            <span class="status ${t.status}">${t.status === 'on-track' ? '✓' : '⚠'} ${t.status}</span>
          </div>
          <div style="font-size: 0.9em; color: #94a3b8; margin-bottom: 8px;">${t.task}</div>
          <div class="progress"><div class="progress-bar" style="width: ${t.prog}%"></div></div>
          <div style="font-size: 0.85em; color: #64748b; margin-top: 5px;">${t.prog}% • Lead: ${t.lead} • ${t.size} members</div>
        </div>
      `).join('');

      // Anomalies
      document.getElementById('anomalies').innerHTML = (state.anomalies || []).map((a, i) => `
        <div class="anomaly ${a.severity}">
          <strong>${a.rule}</strong>
          <div style="font-size: 0.9em; margin-top: 5px; color: #cbd5e1;">${a.detail}</div>
          <div class="severity">${a.severity} • ${a.action}</div>
          ${!a.resolved ? `<button onclick="resolveAnomaly(${i})" style="background: #8b5cf6; margin-right: 10px;">Resolve</button>` : '<span style="color: #10b981;">✓ Resolved</span>'}
        </div>
      `).join('');

      // Check-ins
      document.getElementById('checkins').innerHTML = (state.checkins || []).map(c => `
        <div class="checkin-item">
          <strong>${c.type}</strong> • Team ${c.team}<br>
          <span class="confirmed">${c.confirmed}/${c.expected}</span> confirmed • ${c.time}
        </div>
      `).join('');

      // Discord
      document.getElementById('discord').innerHTML = (state.discordLog || []).map(d => `
        <div class="log-entry">
          <strong>${d.name}</strong> • Skills: ${d.skills}<br>
          <em style="color: #94a3b8;">${d.recommendation}</em>
        </div>
      `).join('');
    }

    async function askAI() {
      const prompt = document.getElementById('aiPrompt').value;
      if (!prompt) return;
      try {
        const res = await fetch(`${API_BASE}/api/ai`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, context: JSON.stringify(state) })
        });
        const { answer } = await res.json();
        const resp = document.getElementById('aiResponse');
        resp.innerHTML = `<strong>🤖 AI:</strong><br>${answer}`;
        resp.style.display = 'block';
      } catch (e) { alert('Error: ' + e.message); }
    }

    async function matchNewMember() {
      const name = document.getElementById('newMemberName').value;
      const skills = document.getElementById('newMemberSkills').value;
      const interest = document.getElementById('newMemberInterest').value;
      if (!name || !skills || !interest) { alert('Fill all fields'); return; }
      try {
        const res = await fetch(`${API_BASE}/api/discord-match`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, skills, interest })
        });
        const { recommendation } = await res.json();
        alert('Recommendation: ' + recommendation);
        fetchState();
      } catch (e) { alert('Error: ' + e.message); }
    }

    async function resolveAnomaly(idx) {
      try {
        await fetch(`${API_BASE}/api/anomaly/${idx}/resolve`, { method: 'PATCH' });
        fetchState();
      } catch (e) { alert('Error: ' + e.message); }
    }

    // SSE for live updates
    function setupSSE() {
      const es = new EventSource(`${API_BASE}/api/events`);
      es.addEventListener('team-updated', e => {
        const data = JSON.parse(e.data);
        const log = document.getElementById('live');
        log.innerHTML = `<div class="log-entry">📊 Team ${data.id} updated: ${data.status} @ ${data.prog}%</div>` + log.innerHTML;
        fetchState();
      });
      es.addEventListener('anomaly-resolved', e => {
        const log = document.getElementById('live');
        log.innerHTML = `<div class="log-entry">✅ Anomaly #${JSON.parse(e.data).idx} resolved</div>` + log.innerHTML;
        fetchState();
      });
      es.addEventListener('discord-join', e => {
        const log = document.getElementById('live');
        log.innerHTML = `<div class="log-entry">👤 New member: ${JSON.parse(e.data).name}</div>` + log.innerHTML;
        fetchState();
      });
    }

    fetchState();
    setupSSE();
  </script>
</body>
</html>
